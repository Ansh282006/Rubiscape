# .gitpod.yml
tasks:
  - name: Setup Rubiscape Backend
    init: |
      python -m venv venv
      source venv/bin/activate
      pip install fastapi uvicorn sqlalchemy psycopg2-binary
    command: |
      source venv/bin/activate
      echo "✅ Environment ready!"
      echo "🚀 Run: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000"

ports:
  - port: 8000
    onOpen: open-preview
